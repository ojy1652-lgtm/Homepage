backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow

media_folder: public/images/uploads
public_folder: /images/uploads

site_url: /
display_url: /
logo_url: /images/uploads/lab-hero.png

collections:
  - name: principal_investigator
    label: Principal Investigator
    files:
      - label: PI Profile
        name: pi_profile
        file: src/content/pi/sang-ho-oh.md
        fields:
          - { label: Label, name: label, widget: string, default: Principal Investigator }
          - { label: Name, name: name, widget: string }
          - { label: Title, name: title, widget: string, default: Professor }
          - { label: Department, name: department, widget: string }
          - { label: Institution, name: institution, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Google Scholar URL, name: scholarUrl, widget: string, required: false }
          - { label: Photo, name: photo, widget: image, required: false }
          - label: Education
            name: education
            widget: list
            required: false
            field: { label: Education Item, name: item, widget: string }
          - label: Research Experience
            name: researchExperience
            widget: list
            required: false
            fields:
              - { label: Position, name: position, widget: string }
              - { label: Period, name: period, widget: string }
              - { label: Affiliation, name: affiliation, widget: text }
          - label: Representative Publications
            name: representativePublications
            widget: list
            required: false
            field: { label: Publication, name: publication, widget: text }

  - name: research
    label: Research
    folder: src/content/research
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Order, name: order, widget: number, value_type: int, default: 10 }
      - { label: Body, name: body, widget: markdown }

  - name: publications
    label: Publications
    folder: src/content/publications
    create: true
    slug: "{{year}}-{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: ["year", "title", "journal"]
    summary: "{{year}} · {{title}}"
    fields:
      - { label: Display Order, name: order, widget: hidden, default: 10 }
      - { label: Title, name: title, widget: string }
      - label: Authors
        name: authors
        widget: authors_with_flags
        hint: "쉼표와 띄어쓰기로 저자를 한 번에 입력하면 자동으로 사람별 항목이 생성됩니다."
      - { label: Journal, name: journal, widget: string }
      - { label: Year, name: year, widget: string, required: false, hint: "2026처럼 숫자를 입력하거나 accepted/submitted처럼 상태를 입력할 수 있습니다." }
      - { label: Volume, name: volume, widget: string, required: false }
      - { label: Pages, name: pages, widget: string, required: false }
      - { label: DOI, name: doi, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Abstract, name: body, widget: markdown, required: false }

  - name: people
    label: People
    folder: src/content/people
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: ["name", "role", "category"]
    summary: "{{category}} · {{name}} · {{role}}"
    fields:
      - { label: Display Order, name: order, widget: hidden, default: 10 }
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string, hint: "PI, Professor, PhD Student, MS Student, Alumni 등" }
      - label: Category
        name: category
        widget: select
        default: researcher
        options:
          - { label: Researcher, value: researcher }
          - { label: Alumni, value: alumni }
          - { label: Collaborator, value: collaborator }
      - { label: Group, name: group, widget: string, required: false }
      - { label: Email, name: email, widget: string, required: false }
      - { label: Website, name: website, widget: string, required: false }
      - { label: Photo, name: photo, widget: image, required: false }
      - label: Education
        name: education
        widget: list
        required: false
        field: { label: Education Item, name: item, widget: string }
      - { label: Alumni, name: alumni, widget: boolean, default: false }
      - { label: Bio, name: body, widget: markdown, required: false }

  - name: facilities
    label: Facilities
    folder: src/content/facilities
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - label: Section
        name: section
        widget: select
        default: tem-fib
        options:
          - { label: TEM & FIB, value: tem-fib }
          - { label: In-situ holder, value: in-situ-holder }
      - { label: Category, name: category, widget: string }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Location, name: location, widget: string, required: false }
      - label: Specs
        name: specs
        widget: list
        required: false
        field: { label: Spec, name: spec, widget: string }
      - { label: Order, name: order, widget: number, value_type: int, default: 10 }
      - { label: Description, name: body, widget: markdown, required: false }

  - name: news
    label: News
    folder: src/content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Summary, name: summary, widget: text }
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
