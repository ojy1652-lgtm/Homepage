<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Order Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="stylesheet" href="/admin/tool-pages.css" />
  </head>
  <body>
    <main>
      <a class="button secondary" href="/admin/">Back to CMS</a>
      <h1>Order Manager</h1>
      <p>
        Reorder publications within the same year and people within the same category. Year groups are locked, so a
        2026 publication cannot be moved below 2025.
      </p>

      <div class="toolbar">
        <button type="button" data-load="publications">Load Publications</button>
        <button type="button" data-load="people">Load People</button>
        <button type="button" class="secondary" data-login>Login</button>
        <button type="button" data-save>Save order changes</button>
      </div>

      <div data-list class="manager-list"></div>
      <pre data-log>Choose a collection to load.</pre>
    </main>

    <script src="/admin/order-manager.js"></script>
  </body>
</html>
